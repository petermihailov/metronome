<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <!-- Main -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metronome</title>
    <meta name="description" content="Metronome App" />
    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Metronome" />
    <meta property="og:title" content="Metronome" />
    <meta property="og:image" content="https://petermihailov.github.io/metronome/og-512.jpg" />
    <meta property="og:url" content="https://petermihailov.github.io/metronome/" />
    <!-- Favicon -->
    <link href="/favicon.png" rel="icon" media="(prefers-color-scheme: dark)" />
    <link href="/favicon.png" rel="icon" media="(prefers-color-scheme: light)" />
    <!-- Apple Touch Icon (iOS) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <!-- PWA -->
    <meta name="theme-color" content="#000" />
    <!-- Set theme -->
    <script>
      try {
        const colors = JSON.parse(window.localStorage.getItem('mn_colors'))
        if (colors) {
          const map = {
            accent1: '--hsl-accent-1',
            accent2: '--hsl-accent-2',
            background: '--hsl-background',
            backgroundApp: '--hsl-background-app',
            border: '--hsl-border',
            text: '--hsl-text',
          }
          Object.keys(colors).forEach((key) => {
            if (colors[key]) {
              document.documentElement.style.setProperty(map[key], colors[key])
            }
          })
        }
      } catch (e) {
        console.error(e)
      }
    </script>
    <!-- App module -->
    <script type="module" src="/src/index.tsx"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8QNSX88M08"></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())
      gtag('config', 'G-8QNSX88M08')
    </script>
  </head>
  <body>
    <div data-react-root></div>
    <div data-modal></div>
  </body>
</html>
